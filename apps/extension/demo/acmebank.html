<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acme Bank — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(160deg, #f4f5fb, #e9ebf5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Manrope', system-ui, sans-serif;
      }
      .card {
        width: 340px;
        background: #fff;
        border-radius: 20px;
        padding: 34px 30px;
        box-shadow: 0 20px 50px rgba(30, 30, 60, 0.12);
      }
      .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 26px; }
      .brand-logo {
        width: 34px; height: 34px; border-radius: 10px;
        background: linear-gradient(145deg, #2563eb, #1e40af);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-weight: 800; font-family: 'Sora', sans-serif;
      }
      .brand-name { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 18px; color: #1a2340; }
      label { display: block; font-size: 13px; color: #8890a6; font-weight: 600; margin-bottom: 6px; }
      input {
        width: 100%;
        padding: 13px 14px;
        border-radius: 11px;
        border: 1.5px solid #e2e4ef;
        background: #fbfbfe;
        font-size: 14px;
        color: #1a2340;
        font-weight: 500;
        font-family: inherit;
        outline: none;
      }
      input:focus { border-color: #6d5ce6; background: #faf9ff; }
      input[type='password'] { font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
      .field { margin-bottom: 16px; }
      .field--last { margin-bottom: 22px; }
      button {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 11px;
        background: linear-gradient(145deg, #2563eb, #1e40af);
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
      }
    </style>
  </head>
  <!-- data-aegis-demo simula o domínio para o content script em localhost -->
  <body data-aegis-demo="acmebank.com.br">
    <form class="card" onsubmit="event.preventDefault()">
      <div class="brand">
        <div class="brand-logo">A</div>
        <span class="brand-name">Acme Bank</span>
      </div>
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" autocomplete="username" />
      </div>
      <div class="field field--last">
        <label for="password">Senha</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button type="submit">Entrar</button>
    </form>
  </body>
</html>
