services:
  pwa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis
    ports:
      - "8081:80"
    networks:
      - default
      - npm-net
    restart: unless-stopped

  runner:
    image: myoung34/github-runner:latest
    container_name: aegis-runner
    environment:
      REPO_URL: https://github.com/jesieldotdev/aegis
      RUNNER_NAME: aegis-host
      RUNNER_TOKEN: ${RUNNER_TOKEN}
      RUNNER_SCOPE: repo
      LABELS: self-hosted,aegis
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      - runner-data:/actions-runner
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  runner-data:

networks:
  npm-net:
    external: true
